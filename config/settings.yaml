# TikTok Live AI Monitor — Cấu hình

tiktok:
  default_username: ""   # @username kết nối (có thể truyền qua CLI)
  reconnect_on_error: true
  reconnect_delay_seconds: 10

web:
  host: "0.0.0.0"
  port: 8000
  sound_on_gift: true

ai:
  enabled: false          # false = giai đoạn 1 chỉ giám sát
  provider: "groq"        # groq (miễn phí console.groq.com) | openai | gemini (khi có code)
  model: "llama-3.3-70b-versatile"
  
  trigger_mode: "turn"    # turn | message_threshold | gift | hybrid
  
  turn:
    interval_seconds: 60
    
  message_threshold:
    max_messages: 20
    low_activity_threshold: 3
    
  gift:
    enabled: true
    lookup_profile: true
    profile_mode: "name_only"   # name_only | full_profile
    
  context_window_turns: 5
  
  priority_filter:
    gifts: "always"
    followers: "always"
    comments: "if_relevant"
    joins: "never"
    likes: "aggregate_only"
    
  token_budget:
    max_tokens_per_hour: 50000
    alert_at_percent: 80
    fallback_mode: "turn_only"
